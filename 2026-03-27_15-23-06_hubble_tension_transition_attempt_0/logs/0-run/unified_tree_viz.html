      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }
};

ess will allow us to identify the hidden layer size that provides the\nbest balance of training and generalization for the synthetic cosmology task.", "Ablation name: Activation Function Modification. To conduct the ablation study\non the activation functions, I will modify the `create_model` function to use a\nparameter specifying the activation function (ReLU, Tanh, Sigmoid, or Leaky\nReLU). Then, I'll loop through a list of these activations, train the model for\neach, and record the results in the `experiment_data` dictionary specific to\neach activation type. The data will be saved using the required filename\nconvention for losses, metrics, predictions, and ground truths.", "Ablation name: Dataset Variation Ablation. To implement the ablation study for\ndataset variations, I will create three synthetic datasets: a sinusoidal\ndataset, a linear dataset with noise, and a quadratic dataset with noise. These\ndatasets will each be passed through the training and validation pipeline\nseparately, keeping the model architecture and training process the same for\nconsistency. I'll record the training and validation losses, predictions, and\nother relevant metrics for each dataset, storing all results in a structured\ndictionary and saving it as a numpy file. This approach will clarify how well\nthe model adapts to differing data patterns.", "Ablation name: Optimizer Ablation. To conduct an optimizer ablation study, I'll\nmodify the existing code to include testing with different optimizers: Adam, SGD\nwith momentum, RMSprop, and Adagrad. I will define a loop where each of these\noptimizers is applied to the model training process individually. Each\noptimizer's impact on the model will be recorded in terms of training and\nvalidation losses, Bayesian Evidence Ratio, predictions, and ground truth. The\nexperiment data for each optimizer will be organized in the `experiment_data`\ndictionary and saved as a `.npy` file for future analysis.", "Ablation name: Loss Function m`. Additionally, the predictions and ground truth collections\nshould be reset before adding new data for each dimension, to prevent\naccumulation and mismatching indices in subsequent dimensions.", "To fix the RuntimeError related to the shape mismatch for input dimensions in\nthe neural network model, we need to ensure that the input features fed into the\nmodel match the expected dimensionality. The error indicates that when creating\nslices of the input data for different input dimensions, we are using the full\ndataset which has more dimensions than specified in the variable\n`input_dimensions`. We can improve this by creating different instances of the\n`DataLoader` for each input dimension or by ensuring we only slice the necessary\nnumber of features required by the `model`. Additionally, observing device\nusage, we ensure all tensors related to model input and output are explicitly\nmoved to the device. Here is the corrected implementation:", "To fix the bug in the previous implementation, we need to ensure that the `SGD`\noptimizer is correctly instantiated without passing unwanted keyword arguments\nto the lambda function. The TypeError indicates that the lambda function for\n`SGD` does not accept the `lr` argument. We should modify the lambda function to\nproperly accept and pass both `lr` and `momentum` during its call. Also, ensure\nthat the model and input tensors are moved to the appropriate device using\n`to(device)` method, and the optimizer is created after moving the model to the\ndevice.", "Ablation name: Regularization Technique Ablation. To conduct an ablation study\non regularization techniques, I'll modify the provided baseline code to include\nexperiments with L1, L2 (weight decay), and dropout regularizations separately.\nFor each technique, I'll adjust the model's definition or the optimizer's\nconfiguration accordingly, then train and evaluate the model. I'll record\ntraining and validation losses, Bayesian evidence ratio (BER), predictions, and\nground truth for each experiment. Data for each technique will be saved using\nthe specified structure and filename.", "Ablation name: Weight Initialization Ablation. To implement the weight\ninitialization ablation study, I will modify the `create_model` function to\nallow different initialization strategies: Default (PyTorch's), Xavier (Glorot),\nand He initialization. I'll then iterate over these strategies for a fixed\nhidden layer size, e.g., 64, to evaluate their impact on the model performance\nover a set number of epochs. All data such as losses, metrics, and predictions\nwill be stored following the specified naming convention. The rest of the code\nstructure will remain similar, with the training and validation loops for model\nevaluation.", "To fix the error \"TypeError: <lambda>() got an unexpected keyword argument\n'lr'\", we need to revise the lambda function used for the \"SGD\" optimizer.\nInstead of using a lambda function, we should directly define the optimizer with\nits required parameters. Additionally, ensure that the model is moved to the\ncorrect device before defining the optimizer. This makes sure the parameters\nused for the optimizer are on the GPU if available. Below is the updated\nimplementation which fixes the optimizer bug and adheres to the required\nguidelines for using device and saving experiment data.", "Ablation name: Learning Rate Scheduler Ablation. The proposed solution\nintroduces a learning rate scheduler to the existing implementation to\ndynamically adjust the learning rate during training. We implement `StepLR` as\nthe scheduler in the training loop, adjusting the learning rate every 5 epochs\nwith a decay factor of 0.5. This modification aims to improve model performance\nand stability in comparison to using a constant learning rate.", "Ablation name: Model Output Layer Variation Ablation. To implement the ablation\nstudy, we will modify the output layer of the neural network model to include\ntwo variations by `input_dim`. In\nthe experiment loop, adjust data handling and ensure consistent tensor dimension\nhandling between data and model across different input sizes.", "Ablation name: Dropout Layer Ablation. To implement the dropout layer ablation\nstudy, we will introduce dropout layers after each of the ReLU activations\nwithin the `SimpleModel` architecture. We will experiment with different dropout\nrates (e.g., 0.1, 0.3, 0.5) to determine their effect on model performance.\nWe'll modify the experiment data structure to contain dropout variants and\npersist the results for later analysis. The dropout rates will be tested for the\nalready specified hidden layer sizes, and training/validation loss and Bayesian\nEvidence Ratio (BER) will be tracked and saved.", "To fix the RuntimeError caused by incompatible shapes during matrix\nmultiplication in PyTorch, the issue lies in mismatching input dimensions\nexpected by the model's linear layers. The number of input features (input_dim)\nused when feeding data to the model should match the number of input features\nspecified during model creation. The error occurs because we're reusing the same\nDataLoader for different input dimensions, but not adjusting the input data or\nmodel architecture accordingly. To fix this, make sure each model is trained\nwith a DataLoader whose batches are aligned to the current input dimension by\nreshaping the input data appropriately. Additionally, create models and their\nrespective optimizers after defining the input size adjustments.", "To fix the error encountered in the previous implementation, we need to ensure\nthat the model's input dimensions are consistent with the input layer size of\nthe model. The error occurs because the input dimensions used for training do\nnot match the input size expected by the model. We'll accomplish this by\ncreating a variable input dimension size in the model for different experimental\nconfigurations. Each time the input dimension changes, we need to reinitialize\nthe model weights to accommodate the new input size. Additionally, we need to\nensure the optimizer is initialized after moving the model to the device and\nthat inputs are correctly constrained to the specified number of dimensions when\nslicing the data.", "The error in the implementation arises due to a mismatch between the expected\ninput dimensions and the model's weight matrix dimensions during the forward\npass. Specifically, the linear layer expects an input dimension that matches one\nof the specified input dimensions (1, 2, 4, 6, 8), but it encounters a dimension\nmismatch. To fix this, the data size passed to the model's forward call should\nmatch the model's expected input dimensions for each iteration. This requires\nensuring the input to the model is extracted correctly based on the current\ninput dimension being tested in the ablation study.  Here's the updated\nimplementation with the necessary adjustments:", "To address the issue in the previous implementation, the code must be slightly\nrestructured and executed in a way that supports running all models and input\ntensors on the specified device (either CPU or GPU). We should ensure that both\nthe model and data batches are moved to the device using `.to(device)`.\nMoreover, we need to ensure that the optimizer is created after transferring the\nmodel to the correct device to prevent any device-related errors. Lastly, save\nthe experiment data correctly using the `working_dir` path for storing all\nrelevant metrics and information for each epoch of the training process.", "Seed node", "Seed node", "Seed node", "Aggregate results from multiple seeds"], "code": ["import os\nimport torch\nimport numpy as np\nfrom torch import nn, optim\nfrom torch.utils.data import Dataset, DataLoader, random_split\nimport matplotlib.pyplot as plt\n\n# Setup working directory\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\n# Device configuration\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n\n# Define synthetic dataset\nclass CosmologyDataset(Dataset):\n    def __init__(self, size=1000):\n        self.data = np.random.uniform(0, 2, (size, 1))  # Simulated redshifts\n        # Simulated cosmological values, e.g., H0(z), w(z)\n        self.targets = np.sin(self.data) + 0.1 * np.random.randn(size, 1)\n\n    def __len__(self):\n        return len(self.data)\n\n    def __getitem__(self, index):\n        return torch.FloatTensor(self.data[index]), torch.FloatTensor(\n            self.targets[index]\n        )\n\n\n# Create dataset and split into train/val\ndataset = CosmologyDataset()\ntrain_size = int(0.8 * len(dataset))\nval_size = len(dataset) - train_size\ntrain_dataset, val_dataset = random_split(dataset, [train_size, val_size])\ntrain_loader = DataLoader(train_dataset, batch_size=32, shuffle=True)\nval_loader = DataLoader(val_dataset, batch_size=32)\n\n# Experiment data container\nexperiment_data = {\n    \"hyperparam_tuning_hidden_layer_size\": {\n        \"synthetic_cosmology\": {\n            \"metrics\": {\"train\": [], \"val\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"hidden_layer_sizes\": [],\n        },\n    }\n}\n\n\n# Function to create model with varying hidden layer size\ndef create_model(hidden_layer_size):\n    class SimpleModel(nn.Module):\n        def __init__(self):\n            super(SimpleModel, self).__init__()\n            self.fc = nn.Sequential(\n                nn.Linear(1, hidden_layer_size),\n                nn.ReLU(),\n                nn.Linear(hidden_layer_size, hidden_layer_size),\n                nn.ReLU(),\n                nn.Linear(hidden_layer_size, 1),\n            )\n\n        def forward(self, x):\n            return self.fc(x)\n\n    return SimpleModel().to(device)\n\n\n# Hyperparameter tuning for hidden layer size\nhidden_layer_sizes = [16, 32, 64, 128, 256]\nfor size in hidden_layer_sizes:\n    model = create_model(size)\n    criterion = nn.MSELoss()\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n\n    num_epochs = 20\n    for epoch in range(num_epochs):\n        model.train()\n        training_loss = 0.0\n        for batch in train_loader:\n            inputs, targets = batch\n            inputs, targets = inputs.to(device), targets.to(device)\n\n            optimizer.zero_grad()\n            outputs = model(inputs)\n            loss = criterion(outputs, targets)\n            loss.backward()\n            optimizer.step()\n\n            training_loss += loss.item()\n\n        experiment_data[\"hyperparam_tuning_hidden_layer_size\"][\"synthetic_cosmology\"][\n            \"losses\"\n        ][\"train\"].append(training_loss / len(train_loader))\n\n        # Validation\n        model.eval()\n        val_loss = 0.0\n        with torch.no_grad():\n            for batch in val_loader:\n                inputs, targets = batch\n                inputs, targets = inputs.to(device), targets.to(device)\n                outputs = model(inputs)\n                loss = criterion(outputs, targets)\n                val_loss += loss.item()\n\n                # Save predictions and ground truth\n                experiment_data[\"hyperparam_tuning_hidden_layer_size\"][\n                    \"synthetic_cosmology\"\n                ][\"predictions\"].extend(outputs.cpu().numpy())\n                experiment_data[\"hyperparam_tuning_hidden_layer_size\"][\n                    \"synthetic_cosmology\"\n                ][\"ground_truth\"].extend(targets.cpu().numpy())\n\n        val_loss /= len(val_loader)\n        experiment_data[\"hyperparam_tuning_hidden_layer_size\"][\"synthetic_cosmology\"][\n            \"losses\"\n        ][\"val\"].append(val_loss)\n\n        # Compute Bayesian Evidence Ratio (BER) as a placeholder value\n        BER = np.exp(-val_loss)\n        experiment_data[\"hyperparam_tuning_hidden_layer_size\"][\"synthetic_cosmology\"][\n            \"metrics\"\n        ][\"val\"].append(BER)\n\n        print(\n            f\"Epoch {epoch + 1}: Hidden Layer Size = {size}, Validation Loss = {val_loss:.4f}, BER = {BER:.4f}\"\n        )\n\n    # Record the hidden_layer_size\n    experiment_data[\"hyperparam_tuning_hidden_layer_size\"][\"synthetic_cosmology\"][\n        \"hidden_layer_sizes\"\n    ].append(size)\n\n# Save experiment data\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n", "import os\nimport torch\nimport numpy as np\nfrom torch import nn, optim\nfrom torch.utils.data import Dataset, DataLoader, random_split\nimport warnings\n\n# Setup working directory\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\n# Device configuration\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n\n# Define synthetic dataset\nclass CosmologyDataset(Dataset):\n    def __init__(self, size=1000):\n        self.data = np.random.uniform(0, 2, (size, 1))  # Simulated redshifts\n        # Simulated cosmological values, e.g., H0(z), w(z)\n        self.targets = np.sin(self.data) + 0.1 * np.random.randn(size, 1)\n\n    def __len__(self):\n        return len(self.data)\n\n    def __getitem__(self, index):\n        return torch.FloatTensor(self.data[index]), torch.FloatTensor(\n            self.targets[index]\n        )\n\n\n# Create dataset and split into train/val\ndataset = CosmologyDataset()\ntrain_size = int(0.8 * len(dataset))\nval_size = len(dataset) - train_size\ntrain_dataset, val_dataset = random_split(dataset, [train_size, val_size])\ntrain_loader = DataLoader(train_dataset, batch_size=32, shuffle=True)\nval_loader = DataLoader(val_dataset, batch_size=32)\n\n# Experiment data container\nexperiment_data = {\n    \"activation_ablation\": {\n        \"synthetic_cosmology\": {\n            \"metrics\": {\"train\": [], \"val\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"activations\": [],\n        },\n    }\n}\n\n\n# Function to create model with varying activation function\ndef create_model(hidden_layer_size, activation_func):\n    class SimpleModel(nn.Module):\n        def __init__(self):\n            super(SimpleModel, self).__init__()\n            self.fc = nn.Sequential(\n                nn.Linear(1, hidden_layer_size),\n                activation_func(),\n                nn.Linear(hidden_layer_size, hidden_layer_size),\n                activation_func(),\n                nn.Linear(hidden_layer_size, 1),\n            )\n\n        def forward(self, x):\n            return self.fc(x)\n\n    return SimpleModel().to(device)\n\n\n# Define the list of activation functions to explore\nactivation_functions = [\n    (nn.ReLU, \"ReLU\"),\n    (nn.Tanh, \"Tanh\"),\n    (nn.Sigmoid, \"Sigmoid\"),\n    (nn.LeakyReLU, \"LeakyReLU\"),\n]\n\nhidden_layer_size = 64  # Fixed hidden layer size for consistency\nfor activation_func, name in activation_functions:\n    model = create_model(hidden_layer_size, activation_func)\n    criterion = nn.MSELoss()\n    optimizer = optim.Adam(model.parameters(), lr=0.001)\n\n    num_epochs = 20\n    for epoch in range(num_epochs):\n        model.train()\n        training_loss = 0.0\n        for batch in train_loader:\n            inputs, targets = batch\n            inputs, targets = inputs.to(device), targets.to(device)\n\n            optimizer.zero_grad()\n            outputs = model(inputs)\n            loss = criterion(outputs, targets)\n            loss.backward()\n            optimizer.step()\n\n            training_loss += loss.item()\n\n        experiment_data[\"activation_ablation\"][\"synthetic_cosmology\"][\"losses\"][\n            \"train\"\n        ].append(training_loss / len(train_loader))\n\n        # Validation\n        model.eva ng training.", "plot_path": "experiments/2026-03-27_15-23-06_hubble_tension_transition_attempt_0/logs/0-run/experiment_results/experiment_8199055269d344b7a21677d34bf9c5c4_proc_61167/synthetic_cosmology_loss_curves.png"}, {"analysis": "The Bayesian Evidence Ratio (BER) plot shows the model's performance metric over epochs for different batch sizes. All curves rapidly increase in the initial epochs and plateau around a BER of 1.0, indicating strong convergence. Larger batch sizes tend to achieve higher BER values earlier, suggesting that they may facilitate faster optimization and better performance. The consistent convergence across batch sizes demonstrates the model's robustness in achieving the desired evidence ratio.", "plot_path": "experiments/2026-03-27_15-23-06_hubble_tension_transition_attempt_0/logs/0-run/experiment_results/experiment_8199055269d344b7a21677d34bf9c5c4_proc_61167/synthetic_cosmology_BER_curves.png"}], [{"analysis": "The plot shows the Bayesian Evidence Ratio (BER) for different activation functions over epochs. LeakyReLU exhibits the most consistent performance with BER remaining stable above 0.98 for most epochs, except for two significant dips at around epochs 40 and 60. These dips suggest potential instability or sensitivity in the model's performance during these periods. Other activation functions, such as ReLU, Tanh, and Sigmoid, have relatively lower BER and exhibit more variability, indicating that LeakyReLU might be better suited for this problem. The results imply that activation function choice significantly impacts the model's ability to identify cosmological transitions effectively.", "plot_path": "experiments/2026-03-27_15-23-06_hubble_tension_transition_attempt_0/logs/0-run/experiment_results/experiment_63af9e7fba05453ab1a9702717630edb_proc_64176/synthetic_cosmology_ber_plot.png"}, {"analysis": "This plot illustrates the training and validation losses for various activation functions over epochs. All activation functions show a g le\nand generalizable models, while a rate of 0.0001 shows instability and 0.1\nconverges quickly but may sacrifice fine-tuning.", "The plots demonstrate that the model generally performs well under varying noise\nlevels, with robust generalization at lower noise levels and increasing\nsensitivity to noise as it rises. The loss curves and scatter plots provide\nclear insights into model performance and its limitations under noise.", "[]", "[]", "The plots provide insights into the performance of various optimizers (Adam,\nAdagrad, SGD, RMSprop) across loss and Bayesian Evidence Ratio (BER) metrics.\nAll optimizers show effective learning, with minimal overfitting observed in\nmost cases. However, the RMSprop optimizer exhibits slight instability in BER\nand validation loss, which may require further investigation.", "The plots reveal the effects of different regularization techniques on model\ntraining and validation loss. L2 regularization shows good generalization with\nminimal overfitting. Dropout regularization prevents overfitting but exhibits\nsome instability in validation loss, suggesting a need for further tuning. L1\nregularization leads to underfitting, as evidenced by the constant validation\nloss, indicating it may be too restrictive in this context.", "[]", "[]", "The experimental plots indicate that the model is learning effectively,\ngeneralizing well, and achieving high accuracy. However, some minor\ndiscrepancies between predictions and ground truth suggest potential areas for\nfurther refinement, particularly in edge cases.", "The provided plots demonstrate consistent model training behavior with effective\nconvergence of loss curves and a strong correlation between predictions and\nground truth. Occasional spikes in loss curves suggest optimization issues that\ncould be addressed. Overall, the results indicate that the model is learning\neffectively but may benefit from further fine-tuning to improve stability and\naccuracy.", "[]", "[]", "[]", "
